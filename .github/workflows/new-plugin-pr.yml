name: Propose new plugins

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-and-propose:
    name: Discover new plugins and open PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'biocini'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Add kakoune-overlay cache
        uses: cachix/cachix-action@v17
        with:
          name: kakoune-overlay
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Discover new plugins
        id: discover
        run: |
          NEW_PLUGINS=$(./repos/plugins/discover)
          COUNT=$(echo "$NEW_PLUGINS" | grep -c '^')
          if [ -z "$NEW_PLUGINS" ] || [ "$COUNT" -eq 0 ]; then
            echo "No new plugins discovered."
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "new_plugins<<EOF"
            echo "$NEW_PLUGINS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "New plugins discovered ($COUNT):"
          echo "$NEW_PLUGINS"

      - name: Spend guard
        if: steps.discover.outputs.count != '0'
        run: |
          COUNT="${{ steps.discover.outputs.count }}"
          if [ "$COUNT" -gt 20 ]; then
            echo "ERROR: $COUNT new plugins exceeds spend guard (20). Aborting."
            exit 1
          fi

      - name: Install GitHub Copilot CLI
        if: steps.discover.outputs.count != '0'
        run: |
          gh auth login --with-token <<< "${{ secrets.COPILOT_PAT }}"
          gh extension install github/gh-copilot

      - name: Security vetting (Phase 1)
        if: steps.discover.outputs.count != '0'
        run: |
          cat > /tmp/task.md << 'TASK_EOF'
          Read `.pi/skills/kakoune-overlay-security/SKILL.md` in full.

          For each plugin in /tmp/new-plugins.json:

          1. Check `docs/security-audit.json` for an existing entry. If
             the plugin was previously audited with PASS and the upstream
             source has not changed, reuse the existing verdict.
          2. Otherwise, fetch all `.kak` files from the plugin's GitHub
             source tree via `curl` using the repo/rev from the
             manifest entry and apply the security review criteria.
          3. Write your verdict (`PASS`, `WARN`, or `FAIL`) and findings
             to `/tmp/security-report.json` as a JSON object keyed by
             plugin name, with fields:
             - `verdict`: string, one of PASS, WARN, FAIL
             - `findings`: string, empty if PASS
             - `flagged_lines`: array of {file, line, pattern} objects,
               empty if PASS
          4. Append the new audit entry to `docs/security-audit.json`,
             preserving all existing entries. Include `last_audited`
             with today's date.
          5. If any plugin receives a `FAIL` verdict, write the string
             `FAIL` to `/tmp/security-verdict`. Otherwise write `PASS`.
             Continue reviewing remaining plugins even after a FAIL.
          TASK_EOF
          gh copilot suggest --target shell --non-interactive < /tmp/task.md
          if [ ! -f /tmp/security-verdict ]; then
            echo "PASS" > /tmp/security-verdict
          fi

      - name: Manifest and overrides update (Phase 2)
        if: steps.discover.outputs.count != '0'
        run: |
          if [ "$(cat /tmp/security-verdict)" = "FAIL" ]; then
            echo "Security FAIL detected. Skipping manifest/overrides update."
            exit 0
          fi
          cat > /tmp/task.md << 'TASK_EOF'
          You are given /tmp/new-plugins.json -- a JSON object of newly
          discovered plugins in the same schema as
          repos/plugins/manifest.json. For each plugin:

          1. Merge its entry into repos/plugins/manifest.json, preserving
             all existing entries and maintaining valid JSON.
          2. Fetch the plugin's .kak source files from GitHub via curl
             using the repo/rev from the entry.
          3. Check whether any .kak file contains a hardcoded path that
             will not resolve correctly from the Nix store -- specifically
             patterns like $kak_config/some-file, ~/.config/kak/..., or
             paths constructed relative to the plugin source directory at
             install time that point to a file that ships with the plugin.
          4. If such a path exists and the target file is included in the
             plugin's source tree, add an entry to
             repos/plugins/meta.nix with a postInstall block using
             substituteInPlace to rewrite it to the correct
             $out/share/kak/autoload/plugins/<name>/... path.
          5. If no hardcoded paths requiring rewriting are found, do not
             add an entry to meta.nix.
          6. Write the commit message to /tmp/msg.txt following AGENTS.md
             conventions (feat(plugins) scope, two-paragraph body,
             Generated-with trailer).
          TASK_EOF
          gh copilot suggest --target shell --non-interactive < /tmp/task.md

      - name: Create branch and PR
        if: steps.discover.outputs.count != '0'
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          BRANCH="new-plugins-${TIMESTAMP}"
          git checkout -b "$BRANCH"

          HAS_FAIL=false
          if [ -f /tmp/security-report.json ]; then
            if jq -e 'to_entries[] | select(.value.verdict == "FAIL")' /tmp/security-report.json >/dev/null 2>&1; then
              HAS_FAIL=true
            fi
          fi

          if [ "$HAS_FAIL" = "false" ] && [ -f /tmp/msg.txt ]; then
            git add repos/plugins/manifest.json
            [ -f repos/plugins/meta.nix ] && git add repos/plugins/meta.nix
            [ -f docs/security-audit.json ] && git add docs/security-audit.json
            git commit -F /tmp/msg.txt
            git push -u origin "$BRANCH"
          elif [ "$HAS_FAIL" = "false" ]; then
            git add repos/plugins/manifest.json
            [ -f repos/plugins/meta.nix ] && git add repos/plugins/meta.nix
            [ -f docs/security-audit.json ] && git add docs/security-audit.json
            cat > /tmp/fallback-msg.txt << 'MSG'
            feat(plugins): add newly discovered plugins

            Discovered new Kakoune plugins from GitHub topic search.

            Generated-with: github-actions (copilot-assisted)
            MSG
            git commit -F /tmp/fallback-msg.txt
            git push -u origin "$BRANCH"
          else
            echo "Security FAIL detected. Creating PR for review without manifest changes."
            [ -f docs/security-audit.json ] && git add docs/security-audit.json
            if [ -f /tmp/msg.txt ]; then
              git commit --allow-empty -F /tmp/msg.txt
            else
              git commit --allow-empty -m "security: flag new plugins for human review [SECURITY FAIL]"
            fi
            git push -u origin "$BRANCH"
          fi

          NEW_PLUGINS="${{ steps.discover.outputs.new_plugins }}"
          BODY="# New Kakoune Plugins\n\n"

          if [ "$HAS_FAIL" = "true" ]; then
            BODY="${BODY}> ⚠️ **SECURITY FAIL detected.** One or more plugins "
            BODY="${BODY}failed automated security vetting. The manifest has **not** "
            BODY="${BODY}been updated. This PR exists solely to surface the findings "
            BODY="${BODY}for human review.\n\n"
          fi

          while IFS= read -r name; do
            meta=$(jq --arg n "$name" '.[$n]' /tmp/new-plugins.json)
            repo=$(echo "$meta" | jq -r '.repo')
            BODY="${BODY}### ${name} (${repo})\n\n"

            if [ -f /tmp/security-report.json ]; then
              verdict=$(jq -r --arg n "$name" '.[$n].verdict // "PASS"' /tmp/security-report.json)
              findings=$(jq -r --arg n "$name" '.[$n].findings // ""' /tmp/security-report.json)
              BODY="${BODY}**Security verdict: ${verdict}**\n"
              if [ -n "$findings" ] && [ "$findings" != "null" ]; then
                BODY="${BODY}${findings}\n"
              fi
              BODY="${BODY}\n"
            fi

            BODY="${BODY}- [ ] manifest entry looks correct (rev, sha256, branch)\n"
            BODY="${BODY}- [ ] .kak source reviewed for hardcoded paths "
            BODY="${BODY}requiring store rewrites\n"
            BODY="${BODY}- [ ] meta.nix entry present only if a path "
            BODY="${BODY}rewrite is genuinely needed\n"
            BODY="${BODY}- [ ] nix flake check passes (CI)\n\n"
          done <<< "$NEW_PLUGINS"

          if [ "$HAS_FAIL" = "true" ]; then
            PR_TITLE="[SECURITY FAIL] feat(plugins): new plugins — security review required"
          else
            PR_TITLE="feat(plugins): add newly discovered plugins"
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body "$BODY" \
            --base master \
            --head "$BRANCH"
